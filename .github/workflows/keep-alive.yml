name: Keep-alive FRIGOR

# Mantiene despierta la app en Render (plan free) para que RR.HH. no
# espere el "arranque en frío". Hace ping al endpoint de salud.
on:
  schedule:
    - cron: "*/12 * * * *" # cada 12 minutos
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://frigor-vacaciones.onrender.com/api/health || true)
            echo "Intento $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 20
          done
          echo "La app no respondió 200, pero el workflow no falla (Render puede estar arrancando)."
